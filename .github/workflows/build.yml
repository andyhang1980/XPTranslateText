name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - release
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write Keys
        run: |
          if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
            echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> keystore.properties
            echo androidKeyAlias='${{ secrets.ALIAS }}' >> keystore.properties
            echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> keystore.properties
            echo androidStoreFile='key.jks' >> keystore.properties
            echo "${{ secrets.KEY_STORE }}" | base64 --decode > app/key.jks
          else
            echo "No KEY_STORE secret found; generating a self-signed keystore for this build."
            keytool -genkeypair -v \
              -keystore app/key.jks \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias xp \
              -dname "CN=XPTranslateText, OU=CI, O=XPTranslateText, L=CI, S=CI, C=US" \
              -storepass xp123456 -keypass xp123456
            echo androidStorePassword='xp123456' >> keystore.properties
            echo androidKeyAlias='xp' >> keystore.properties
            echo androidKeyPassword='xp123456' >> keystore.properties
            echo androidStoreFile='key.jks' >> keystore.properties
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app-server:assembleRelease :app-hook:assembleRelease

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/*.apk artifacts/
          cp app-server/build/outputs/apk/release/*.apk artifacts/
          cp app-hook/build/outputs/apk/release/*.apk artifacts/
          ls -la artifacts

      - name: Get Version Name
        id: version
        run: |
          VERSION_NAME=$(grep "^XPTRANSLATETEXT_VERSION_NAME=" gradle.properties | cut -d'=' -f2 | head -n 1)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.version_name }}
          path: artifacts
