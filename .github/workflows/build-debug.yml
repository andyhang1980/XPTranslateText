name: Android Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Build debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build with Gradle (debug)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug :app-server:assembleDebug :app-hook:assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/*.apk artifacts/
          cp app-server/build/outputs/apk/debug/*.apk artifacts/
          cp app-hook/build/outputs/apk/debug/*.apk artifacts/
          ls -la artifacts

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: artifacts
